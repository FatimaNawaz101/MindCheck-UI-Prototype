
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCheck - Log Mood</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <a href="index.html" class="logo">MindCheck</a>
    <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="resources.html">Resources</a></li>
        <li><a href="appointments.html">Appointments</a></li>
    </ul>
    <span class="user">Hello, Fatima</span>
</nav>

<div class="container" style="max-width: 580px;">

    <a href="index.html" class="text-muted" style="text-decoration: none;">Back to Dashboard</a>

    <h1 style="margin-top: 15px;">Log Today's Mood</h1>
    <p class="subtitle">Take a moment to check in with yourself.</p>

    <div class="card">

        <label>How are you feeling today?</label>
        <p class="text-muted mb-10">Pick a number from 1 (very low) to 10 (excellent)</p>

        <div class="mood-row">
            <button class="mood-btn" onclick="pickMood(1)">1</button>
            <button class="mood-btn" onclick="pickMood(2)">2</button>
            <button class="mood-btn" onclick="pickMood(3)">3</button>
            <button class="mood-btn" onclick="pickMood(4)">4</button>
            <button class="mood-btn" onclick="pickMood(5)">5</button>
            <button class="mood-btn" onclick="pickMood(6)">6</button>
            <button class="mood-btn" onclick="pickMood(7)">7</button>
            <button class="mood-btn" onclick="pickMood(8)">8</button>
            <button class="mood-btn" onclick="pickMood(9)">9</button>
            <button class="mood-btn" onclick="pickMood(10)">10</button>
        </div>
        <div class="mood-labels">
            <span>Very Low</span>
            <span>Excellent</span>
        </div>

        <hr class="divider">

        <label for="notes">Journal Notes <span class="text-muted">(Optional)</span></label>
        <textarea id="notes" placeholder="Write about your day, how you are feeling, anything on your mind..."></textarea>

        <div class="alert alert-yellow" id="errorMsg" style="display: none;">
            Please select a mood rating before submitting.
        </div>

        <div style="display: flex; gap: 10px;">
            <a href="index.html" class="btn btn-gray" style="flex: 1; text-align: center;">Cancel</a>
            <button class="btn btn-green" style="flex: 2;" onclick="submitMood()">Submit Mood Entry</button>
        </div>

    </div>

</div>

<script>
    var selectedMood = null;

    function pickMood(val) {
        selectedMood = val;
        var buttons = document.querySelectorAll('.mood-btn');
        for (var i = 0; i < buttons.length; i++) {
            if (i + 1 === val) {
                buttons[i].classList.add('selected');
            } else {
                buttons[i].classList.remove('selected');
            }
        }
        document.getElementById('errorMsg').style.display = 'none';
    }

    function submitMood() {
        if (selectedMood === null) {
            document.getElementById('errorMsg').style.display = 'block';
            return;
        }
        window.location.href = 'mood-confirmation.html?mood=' + selectedMood;
    }
</script>

</body>
</html>
